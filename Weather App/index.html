<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🌦️ Weather App</h1>

    <div class="search-box">
        <input type="text" id="city" placeholder="Enter City / District">
        <button onclick="getWeather()">Search</button>
    </div>

    <div id="weather" class="weather-box hidden">
        <h2 id="location"></h2>
        <h1 id="temp"></h1>
        <p id="condition"></p>

        <div class="details">
            <p>💧 Humidity: <span id="humidity"></span></p>
            <p>🌬️ Wind: <span id="wind"></span></p>
        </div>
    </div>

    <div id="forecast" class="forecast"></div>

</div>

<script src="script.js"></script>
</body>
</html>
